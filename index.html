<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Список покупок</title>

  <!-- ╔══════════════════════════════════════════╗
       ║  🔧 ВСТАВЬ СВОЙ firebaseConfig СЮДА     ║
       ║  console.firebase.google.com             ║
       ╚══════════════════════════════════════════╝ -->
  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyCc2CAV3dTYvpcqizEfiVxZwJ8bOkt0r-8",
      authDomain:        "shoppinglist-5c78f.firebaseapp.com",
      databaseURL:       "https://shoppinglist-5c78f-default-rtdb.firebaseio.com",
      projectId:         "shoppinglist-5c78f",
      storageBucket:     "shoppinglist-5c78f.firebasestorage.app",
      messagingSenderId: "1079786262422",
      appId:             "1:1079786262422:web:7b37ffea8ebfc6f96e17b7"
    };
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }

    body {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      min-height: 100dvh;
      background: #08080f;
      color: #fff;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
    }
    .bg-b { position: absolute; border-radius: 50%; }
    .bg-b1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(124,58,237,.32) 0%, transparent 70%);
      top: -200px; left: -150px;
      animation: d1 14s ease-in-out infinite alternate;
    }
    .bg-b2 {
      width: 550px; height: 550px;
      background: radial-gradient(circle, rgba(6,182,212,.22) 0%, transparent 70%);
      bottom: -120px; right: -100px;
      animation: d2 17s ease-in-out infinite alternate;
    }
    .bg-b3 {
      width: 450px; height: 450px;
      background: radial-gradient(circle, rgba(236,72,153,.18) 0%, transparent 70%);
      top: 45%; left: 35%;
      animation: d3 20s ease-in-out infinite alternate;
    }
    @keyframes d1 { to { transform: translate(70px, 90px) scale(1.18); } }
    @keyframes d2 { to { transform: translate(-50px,-70px) scale(1.12); } }
    @keyframes d3 { to { transform: translate(40px,-50px) scale(.88); } }

    /* ── SCREENS ── */
    .screen { display: none; position: relative; z-index: 1; }
    .screen.active { display: flex; flex-direction: column; }

    /* ════════════════════════════
       PIN SCREEN
    ════════════════════════════ */
    #pinScreen {
      min-height: 100dvh;
      align-items: center; justify-content: center;
      padding: 2rem 1.5rem;
    }
    .pin-card {
      width: 100%; max-width: 320px;
      display: flex; flex-direction: column; align-items: center;
    }
    .app-icon {
      width: 76px; height: 76px; border-radius: 24px;
      background: rgba(255,255,255,.1);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; margin-bottom: 1.25rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.25);
    }
    .pin-title { font-size: 22px; font-weight: 700; letter-spacing: -.5px; margin-bottom: 4px; }
    .pin-sub   { font-size: 14px; color: rgba(255,255,255,.45); margin-bottom: 2.5rem; }
    .pin-dots  { display: flex; gap: 16px; margin-bottom: 2.5rem; }
    .pd {
      width: 13px; height: 13px; border-radius: 50%;
      background: rgba(255,255,255,.18); border: 1.5px solid rgba(255,255,255,.28);
      transition: all .2s cubic-bezier(.34,1.56,.64,1);
    }
    .pd.filled { background:#fff; border-color:#fff; transform:scale(1.12); box-shadow:0 0 12px rgba(255,255,255,.55); }
    .pd.err    { background:rgba(255,70,70,.85); border-color:rgba(255,70,70,.9); box-shadow:0 0 12px rgba(255,70,70,.45); }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 15%{transform:translateX(-8px)} 30%{transform:translateX(8px)}
      45%{transform:translateX(-6px)} 60%{transform:translateX(6px)} 75%{transform:translateX(-3px)} 90%{transform:translateX(3px)}
    }
    .shaking { animation: shake .45s cubic-bezier(.36,.07,.19,.97); }
    .pin-grid { display: grid; grid-template-columns: repeat(3,78px); gap: 11px; margin-bottom: 1rem; }
    .pk {
      height: 78px; border-radius: 22px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.09);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      color: #fff; font-family: inherit; font-size: 24px; font-weight: 400;
      cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: all .12s; user-select: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 4px 16px rgba(0,0,0,.25);
    }
    .pk:hover  { background: rgba(255,255,255,.14); }
    .pk:active { transform: scale(.91); }
    .pk .sub   { font-size: 8px; letter-spacing: 1.5px; color: rgba(255,255,255,.38); margin-top: 2px; font-weight: 500; }
    .pk.ghost  { border:none; background:none; box-shadow:none; backdrop-filter:none; pointer-events:none; }
    .pk.back   { font-size: 18px; }
    .pin-err   { font-size: 13px; color: rgba(255,110,110,.9); min-height: 18px; text-align: center; font-weight: 500; }

    /* ════════════════════════════
       TOP BAR (shared)
    ════════════════════════════ */
    .top-bar {
      position: sticky; top: 0; z-index: 20;
      backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
      border-bottom: 1px solid rgba(255,255,255,.07);
      padding: env(safe-area-inset-top,0px) 1.25rem 0;
    }
    .top-bar-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: .9rem 0 .85rem;
    }
    .top-left { display: flex; align-items: center; gap: 10px; }
    .back-btn {
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px; color: rgba(255,255,255,.7); font-family: inherit;
      font-size: 13px; font-weight: 500; cursor: pointer; padding: 6px 12px;
      display: flex; align-items: center; gap: 5px; transition: all .15s;
    }
    .back-btn:hover { background: rgba(255,255,255,.14); }
    .top-title { font-size: 16px; font-weight: 600; letter-spacing: -.3px; color: rgba(255,255,255,.92); }
    .top-right { display: flex; align-items: center; gap: 8px; }
    .sync-pill {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px; padding: 4px 10px;
      font-size: 11px; font-weight: 500; color: rgba(255,255,255,.5); transition: all .3s;
    }
    .sync-pill.online { color: #4cd964; border-color: rgba(76,217,100,.3); background: rgba(76,217,100,.1); }
    .sdot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.7)} }
    .logout-pill {
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px; padding: 4px 12px;
      font-family: inherit; font-size: 11px; font-weight: 500; color: rgba(255,255,255,.4);
      cursor: pointer; transition: all .15s;
    }
    .logout-pill:hover { background: rgba(255,80,80,.14); border-color: rgba(255,80,80,.3); color: rgba(255,110,110,.9); }

    /* ════════════════════════════
       LISTS SCREEN
    ════════════════════════════ */
    #listsScreen { min-height: 100dvh; }
    .content { padding: 1.5rem 1.25rem 2rem; max-width: 580px; margin: 0 auto; }

    .page-heading {
      font-size: 32px; font-weight: 700; letter-spacing: -1px;
      line-height: 1.08; margin-bottom: 1.5rem;
    }
    .page-heading span {
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* new list row */
    .new-list-row { display: flex; gap: 10px; margin-bottom: 1.5rem; }
    .glass-inp {
      flex: 1; height: 50px; border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      color: #fff; font-family: inherit; font-size: 16px;
      padding: 0 16px; outline: none; transition: all .2s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }
    .glass-inp::placeholder { color: rgba(255,255,255,.28); }
    .glass-inp:focus {
      border-color: rgba(167,139,250,.55);
      background: rgba(255,255,255,.1);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 0 0 3px rgba(167,139,250,.14);
    }
    .icon-btn {
      width: 50px; height: 50px; border-radius: 16px; flex-shrink: 0;
      border: 1px solid rgba(167,139,250,.35);
      background: rgba(167,139,250,.2);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      color: #c4b5fd; font-size: 26px; font-weight: 300; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; box-shadow: inset 0 1px 0 rgba(255,255,255,.18);
      line-height: 1;
    }
    .icon-btn:hover  { background: rgba(167,139,250,.32); }
    .icon-btn:active { transform: scale(.9); }

    /* list cards */
    .lists-grid { display: flex; flex-direction: column; gap: 10px; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .list-card {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      cursor: pointer; transition: background .15s, transform .12s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 3px 14px rgba(0,0,0,.25);
      animation: fadeUp .22s cubic-bezier(.4,0,.2,1);
      user-select: none;
    }
    .list-card:hover  { background: rgba(255,255,255,.11); }
    .list-card:active { transform: scale(.98); }
    .list-card-icon {
      width: 46px; height: 46px; border-radius: 14px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .list-card-body { flex: 1; min-width: 0; }
    .list-card-name {
      font-size: 16px; font-weight: 600; letter-spacing: -.3px;
      color: rgba(255,255,255,.92); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .list-card-meta { font-size: 12px; color: rgba(255,255,255,.38); margin-top: 2px; font-weight: 400; }
    .list-card-arrow { font-size: 14px; color: rgba(255,255,255,.22); }
    .list-del-btn {
      background: none; border: none; color: rgba(255,255,255,.2);
      font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 10px;
      line-height: 1; transition: all .15s; flex-shrink: 0;
    }
    .list-del-btn:hover { color: rgba(255,100,100,.9); background: rgba(255,80,80,.12); }

    /* list card colors */
    .lc-purple { background: rgba(139,92,246,.25); }
    .lc-blue   { background: rgba(59,130,246,.25); }
    .lc-green  { background: rgba(34,197,94,.25); }
    .lc-orange { background: rgba(249,115,22,.25); }
    .lc-pink   { background: rgba(236,72,153,.25); }
    .lc-teal   { background: rgba(20,184,166,.25); }

    /* ════════════════════════════
       ITEMS SCREEN
    ════════════════════════════ */
    #itemsScreen { min-height: 100dvh; }

    /* add row */
    .add-row { display: flex; gap: 10px; margin-bottom: 1.25rem; }

    /* progress */
    .prog-section { margin-bottom: 1.25rem; }
    .prog-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }
    .prog-text { font-size: 12px; font-weight: 500; color: rgba(255,255,255,.38); }
    .prog-pct  { font-size: 12px; font-weight: 600; color: rgba(255,255,255,.52); }
    .prog-track { height: 3px; background: rgba(255,255,255,.1); border-radius: 3px; overflow: hidden; }
    .prog-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
      transition: width .5s cubic-bezier(.4,0,.2,1);
    }

    /* filters */
    .filters { display: flex; gap: 8px; margin-bottom: 1.25rem; }
    .fb {
      flex: 1; height: 34px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.4); font-family: inherit; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all .14s;
    }
    .fb:hover { background: rgba(255,255,255,.1); color: rgba(255,255,255,.7); }
    .fb.on { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.22); color: #fff; }

    /* bulk actions bar */
    .bulk-bar {
      display: none; gap: 8px; margin-bottom: 1.25rem;
    }
    .bulk-bar.show { display: flex; }
    .bulk-btn {
      flex: 1; height: 40px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.07);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      color: rgba(255,255,255,.65); font-family: inherit; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .bulk-btn:hover  { background: rgba(255,255,255,.12); color: #fff; }
    .bulk-btn:active { transform: scale(.97); }
    .bulk-btn.danger:hover { background: rgba(255,80,80,.14); border-color: rgba(255,80,80,.28); color: rgba(255,120,120,.9); }
    .bulk-btn.uncheck:hover { background: rgba(167,139,250,.2); border-color: rgba(167,139,250,.35); color: #c4b5fd; }

    /* items */
    .items-list { display: flex; flex-direction: column; gap: 8px; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .item {
      display: flex; align-items: center; gap: 14px;
      padding: 15px 16px; border-radius: 18px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      cursor: pointer; user-select: none;
      transition: opacity .3s, background .15s, transform .12s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.07), 0 2px 12px rgba(0,0,0,.22);
      animation: slideDown .2s cubic-bezier(.4,0,.2,1);
    }
    .item:hover  { background: rgba(255,255,255,.1); }
    .item:active { transform: scale(.98); }
    .item.done   { opacity: .38; }
    .cb {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,.22); background: rgba(255,255,255,.05);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: #34d399;
      transition: all .22s cubic-bezier(.34,1.56,.64,1);
    }
    .item.done .cb {
      background: rgba(52,211,153,.18); border-color: rgba(52,211,153,.48);
      box-shadow: 0 0 10px rgba(52,211,153,.28); transform: scale(1.06);
    }
    .itext {
      flex: 1; font-size: 16px; font-weight: 400;
      color: rgba(255,255,255,.88); word-break: break-word;
      line-height: 1.35; letter-spacing: -.1px;
    }
    .item.done .itext { text-decoration: line-through; color: rgba(255,255,255,.28); }
    .delbtn {
      background: none; border: none; color: rgba(255,255,255,.18);
      font-size: 20px; line-height: 1; cursor: pointer; padding: 4px 8px;
      border-radius: 10px; flex-shrink: 0; transition: all .15s;
    }
    .delbtn:hover { color: rgba(255,100,100,.9); background: rgba(255,80,80,.12); }

    .empty-msg {
      text-align: center; padding: 4rem 1rem;
      color: rgba(255,255,255,.22); font-size: 15px; font-weight: 400;
    }
    .empty-msg .ico { font-size: 3rem; display: block; margin-bottom: 12px; opacity: .55; }

    /* toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(25,25,38,.88);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      color: rgba(255,255,255,.88); border: 1px solid rgba(255,255,255,.12);
      padding: 10px 22px; border-radius: 22px;
      font-size: 14px; font-weight: 500; pointer-events: none;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      z-index: 999; white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,.45); letter-spacing: -.1px;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* error */
    .error-banner {
      display: none; margin: 0 1.25rem 1rem; padding: 12px 16px; border-radius: 14px;
      background: rgba(255,80,80,.1); border: 1px solid rgba(255,80,80,.22);
      color: rgba(255,150,150,.9); font-size: 13px; line-height: 1.5;
    }
    .error-banner.show { display: block; }

    /* modal overlay */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      align-items: flex-end; justify-content: center;
      padding: 0 1rem env(safe-area-inset-bottom,16px);
    }
    .modal-overlay.show { display: flex; }
    .modal-sheet {
      width: 100%; max-width: 520px;
      background: rgba(25,25,40,.95);
      backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 24px 24px 16px 16px; padding: 1.5rem;
      box-shadow: 0 -8px 40px rgba(0,0,0,.5);
      animation: sheetUp .3s cubic-bezier(.34,1.1,.64,1);
    }
    @keyframes sheetUp { from { transform: translateY(80px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 1rem; letter-spacing: -.3px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 1.25rem; }
    .modal-btn {
      flex: 1; height: 48px; border-radius: 14px; font-family: inherit;
      font-size: 15px; font-weight: 500; cursor: pointer; transition: all .15s;
      border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.08); color: #fff;
    }
    .modal-btn:hover  { background: rgba(255,255,255,.14); }
    .modal-btn:active { transform: scale(.97); }
    .modal-btn.primary {
      background: rgba(167,139,250,.28); border-color: rgba(167,139,250,.4); color: #c4b5fd;
    }
    .modal-btn.primary:hover { background: rgba(167,139,250,.38); }
  </style>
</head>
<body>

<div class="bg">
  <div class="bg-b bg-b1"></div>
  <div class="bg-b bg-b2"></div>
  <div class="bg-b bg-b3"></div>
</div>

<!-- ═══════ PIN ═══════ -->
<div id="pinScreen" class="screen active">
  <div class="pin-card">
    <div class="app-icon">🛒</div>
    <div class="pin-title">Список покупок</div>
    <div class="pin-sub">Введите код доступа</div>
    <div class="pin-dots" id="pinDots">
      <div class="pd" id="pd0"></div><div class="pd" id="pd1"></div>
      <div class="pd" id="pd2"></div><div class="pd" id="pd3"></div>
    </div>
    <div class="pin-grid" id="pinGrid">
      <button class="pk"><span>1</span><span class="sub"></span></button>
      <button class="pk"><span>2</span><span class="sub">ABC</span></button>
      <button class="pk"><span>3</span><span class="sub">DEF</span></button>
      <button class="pk"><span>4</span><span class="sub">GHI</span></button>
      <button class="pk"><span>5</span><span class="sub">JKL</span></button>
      <button class="pk"><span>6</span><span class="sub">MNO</span></button>
      <button class="pk"><span>7</span><span class="sub">PQRS</span></button>
      <button class="pk"><span>8</span><span class="sub">TUV</span></button>
      <button class="pk"><span>9</span><span class="sub">WXYZ</span></button>
      <button class="pk ghost"></button>
      <button class="pk"><span>0</span><span class="sub">+</span></button>
      <button class="pk back" id="backBtn">⌫</button>
    </div>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>

<!-- ═══════ LISTS SCREEN ═══════ -->
<div id="listsScreen" class="screen">
  <div class="top-bar">
    <div class="top-bar-inner">
      <div class="top-title">🛒 Покупки</div>
      <div class="top-right">
        <div class="sync-pill" id="syncPill"><span class="sdot"></span><span id="syncLabel">—</span></div>
        <button class="logout-pill" id="logoutBtn">Выйти</button>
      </div>
    </div>
  </div>
  <div class="error-banner" id="errorBanner"></div>
  <div class="content">
    <div class="page-heading">Мои<br><span>списки</span></div>
    <div class="new-list-row">
      <input class="glass-inp" id="newListInp" type="text" placeholder="Новый список..." autocomplete="off" />
      <button class="icon-btn" id="newListBtn">+</button>
    </div>
    <div class="lists-grid" id="listsGrid"></div>
  </div>
</div>

<!-- ═══════ ITEMS SCREEN ═══════ -->
<div id="itemsScreen" class="screen">
  <div class="top-bar">
    <div class="top-bar-inner">
      <div class="top-left">
        <button class="back-btn" id="backToLists">‹ Списки</button>
        <div class="top-title" id="itemsTitle">Список</div>
      </div>
      <div class="top-right">
        <div class="sync-pill" id="syncPill2"><span class="sdot"></span><span id="syncLabel2">—</span></div>
      </div>
    </div>
  </div>
  <div class="content">
    <div class="add-row">
      <input class="glass-inp" id="addInp" type="text" placeholder="Что купить?" autocomplete="off" />
      <button class="icon-btn" id="addBtn">+</button>
    </div>

    <div class="prog-section" id="progSection" style="display:none">
      <div class="prog-top">
        <span class="prog-text" id="progText"></span>
        <span class="prog-pct" id="progPct"></span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>

    <div class="filters">
      <button class="fb on" data-f="all">Все <span id="cAll">0</span></button>
      <button class="fb" data-f="todo">Купить <span id="cTodo">0</span></button>
      <button class="fb" data-f="done">Куплено <span id="cDone">0</span></button>
    </div>

    <!-- Bulk actions -->
    <div class="bulk-bar" id="bulkBar">
      <button class="bulk-btn uncheck" id="uncheckAllBtn">↩ Снять все галочки</button>
      <button class="bulk-btn danger" id="clearDoneBtn">✕ Удалить купленные</button>
    </div>

    <div class="items-list" id="itemsList">
      <div class="empty-msg"><span class="ico">🛍️</span>Загрузка...</div>
    </div>
  </div>
</div>

<!-- ═══════ DELETE LIST MODAL ═══════ -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal-sheet">
    <div class="modal-title">Удалить список?</div>
    <div style="font-size:14px;color:rgba(255,255,255,.45);line-height:1.5" id="deleteModalText"></div>
    <div class="modal-actions">
      <button class="modal-btn" id="cancelDeleteBtn">Отмена</button>
      <button class="modal-btn primary" id="confirmDeleteBtn" style="background:rgba(255,80,80,.2);border-color:rgba(255,80,80,.35);color:rgba(255,130,130,.9)">Удалить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  'use strict';

  var PIN = '0880';
  var DB_LISTS = 'shopping/lists';

  var pinInput     = '';
  var activeFilter = 'all';
  var toastTimer   = null;
  var db           = null;
  var listsRef     = null;
  var currentListId   = null;
  var currentItemsRef = null;
  var currentItems    = null;
  var pendingDeleteId = null;

  /* ───────── ICONS for lists ───────── */
  var ICONS  = ['🛒','🧺','🥦','🍖','🏠','🎉','🛍️','🍔','💊','🐾'];
  var COLORS = ['lc-purple','lc-blue','lc-green','lc-orange','lc-pink','lc-teal'];
  function pickIcon(name) {
    var h = 0; for (var i = 0; i < name.length; i++) h = (h*31 + name.charCodeAt(i)) & 0xffff;
    return { icon: ICONS[h % ICONS.length], color: COLORS[h % COLORS.length] };
  }

  /* ───────── FIREBASE ───────── */
  function initFirebase() {
    try {
      firebase.initializeApp(firebaseConfig);
      db       = firebase.database();
      listsRef = db.ref(DB_LISTS);
      db.ref('.info/connected').on('value', function (s) {
        var on = s.val();
        setSync('syncPill',  on);
        setSync('syncPill2', on);
      });
      return true;
    } catch (e) { showError('Firebase: ' + e.message); return false; }
  }
  function setSync(id, on) {
    var el = document.getElementById(id);
    var lb = el.querySelector('span:last-child');
    el.className = 'sync-pill' + (on ? ' online' : '');
    lb.textContent = on ? 'Онлайн' : 'Нет связи';
  }

  /* ───────── PIN ───────── */
  function updateDots(state) {
    for (var i = 0; i < 4; i++) {
      var d = document.getElementById('pd' + i);
      d.className = 'pd';
      if (state === 'error')        d.classList.add('err');
      else if (i < pinInput.length) d.classList.add('filled');
    }
  }
  function pinError(msg) {
    var el = document.getElementById('pinDots');
    document.getElementById('pinErr').textContent = msg;
    updateDots('error');
    el.classList.add('shaking');
    el.addEventListener('animationend', function(){ el.classList.remove('shaking'); }, {once:true});
    pinInput = '';
    setTimeout(function(){ updateDots('normal'); document.getElementById('pinErr').textContent=''; }, 1500);
  }
  function pressDigit(d) {
    if (pinInput.length >= 4) return;
    pinInput += d;
    updateDots('normal');
    if (pinInput.length === 4) {
      setTimeout(function(){
        if (pinInput === PIN) {
          showScreen('listsScreen');
          startLists();
        } else {
          pinError('Неверный код');
        }
      }, 160);
    }
  }
  document.getElementById('pinGrid').querySelectorAll('.pk:not(.ghost):not(.back)').forEach(function(btn){
    btn.addEventListener('click', function(){ pressDigit(btn.querySelector('span').textContent.trim()); });
  });
  document.getElementById('backBtn').addEventListener('click', function(){
    if (pinInput.length) { pinInput = pinInput.slice(0,-1); updateDots('normal'); }
    document.getElementById('pinErr').textContent = '';
  });
  document.getElementById('logoutBtn').addEventListener('click', function(){
    if (currentItemsRef) currentItemsRef.off();
    if (listsRef)        listsRef.off();
    pinInput = ''; updateDots('normal');
    showScreen('pinScreen');
  });

  /* ───────── SCREEN ROUTING ───────── */
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
  }

  /* ───────── LISTS SCREEN ───────── */
  function startLists() {
    if (!db && !initFirebase()) return;
    listsRef.on('value', function(snap){ renderLists(snap.val()); });
  }

  function renderLists(data) {
    var grid = document.getElementById('listsGrid');
    if (!data) {
      grid.innerHTML = '<div class="empty-msg"><span class="ico">📋</span>Нет списков — создайте первый!</div>';
      return;
    }
    var arr = Object.keys(data).map(function(id){ return Object.assign({_id:id}, data[id]); });
    arr.sort(function(a,b){ return (a.createdAt||0)-(b.createdAt||0); });

    grid.innerHTML = arr.map(function(list){
      var st = pickIcon(list.name);
      var total = list.items ? Object.keys(list.items).length : 0;
      var done  = list.items ? Object.values(list.items).filter(function(i){ return i.done; }).length : 0;
      var meta  = total === 0 ? 'Пусто' : (done + ' из ' + total + ' куплено');
      return '<div class="list-card" data-lid="'+esc(list._id)+'">'
        + '<div class="list-card-icon '+st.color+'">'+st.icon+'</div>'
        + '<div class="list-card-body">'
        +   '<div class="list-card-name">'+esc(list.name)+'</div>'
        +   '<div class="list-card-meta">'+meta+'</div>'
        + '</div>'
        + '<div class="list-card-arrow">›</div>'
        + '<button class="list-del-btn" data-delid="'+esc(list._id)+'">×</button>'
        + '</div>';
    }).join('');

    grid.querySelectorAll('.list-card').forEach(function(card){
      card.addEventListener('click', function(e){
        if (e.target.classList.contains('list-del-btn')) return;
        openList(card.getAttribute('data-lid'));
      });
    });
    grid.querySelectorAll('.list-del-btn').forEach(function(btn){
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        askDeleteList(btn.getAttribute('data-delid'), data[btn.getAttribute('data-delid')]);
      });
    });
  }

  function createList(name) {
    name = name.trim();
    if (!name || !listsRef) return;
    listsRef.push({ name: name, createdAt: firebase.database.ServerValue.TIMESTAMP });
    showToast('Список «' + name + '» создан');
  }

  function askDeleteList(id, list) {
    pendingDeleteId = id;
    document.getElementById('deleteModalText').textContent =
      'Список «' + (list ? list.name : '') + '» и все продукты в нём будут удалены.';
    document.getElementById('deleteModal').classList.add('show');
  }
  document.getElementById('cancelDeleteBtn').addEventListener('click', function(){
    document.getElementById('deleteModal').classList.remove('show');
  });
  document.getElementById('confirmDeleteBtn').addEventListener('click', function(){
    if (pendingDeleteId && listsRef) {
      listsRef.child(pendingDeleteId).remove();
      showToast('Список удалён');
    }
    document.getElementById('deleteModal').classList.remove('show');
  });
  document.getElementById('deleteModal').addEventListener('click', function(e){
    if (e.target === this) this.classList.remove('show');
  });

  document.getElementById('newListBtn').addEventListener('click', function(){
    var inp = document.getElementById('newListInp');
    createList(inp.value); inp.value = ''; inp.focus();
  });
  document.getElementById('newListInp').addEventListener('keydown', function(e){
    if (e.key === 'Enter') { createList(this.value); this.value = ''; }
  });

  /* ───────── ITEMS SCREEN ───────── */
  function openList(id) {
    if (currentItemsRef) currentItemsRef.off();
    currentListId   = id;
    currentItemsRef = listsRef.child(id + '/items');
    activeFilter    = 'all';
    document.querySelectorAll('.fb').forEach(function(b){ b.classList.remove('on'); });
    document.querySelector('.fb[data-f="all"]').classList.add('on');

    // Set title from lists data — read once
    listsRef.child(id + '/name').once('value', function(s){
      document.getElementById('itemsTitle').textContent = s.val() || 'Список';
    });

    showScreen('itemsScreen');
    currentItemsRef.on('value', function(snap){ renderItems(snap.val()); });
  }

  document.getElementById('backToLists').addEventListener('click', function(){
    if (currentItemsRef) currentItemsRef.off();
    currentListId = null;
    activeFilter  = 'all';
    showScreen('listsScreen');
  });

  /* ── add ── */
  function addItem(text) {
    text = text.trim();
    if (!text || !currentItemsRef) return;
    currentItemsRef.push({ text:text, done:false, createdAt: firebase.database.ServerValue.TIMESTAMP });
    showToast('Добавлено: ' + text);
  }
  document.getElementById('addBtn').addEventListener('click', function(){
    var inp = document.getElementById('addInp');
    addItem(inp.value); inp.value=''; inp.focus();
  });
  document.getElementById('addInp').addEventListener('keydown', function(e){
    if (e.key==='Enter'){ addItem(this.value); this.value=''; }
  });

  /* ── toggle ── */
  function toggleItem(id) {
    if (!currentItemsRef || !currentItems) return;
    var item = currentItems[id];
    if (!item) return;
    currentItemsRef.child(id).update({ done: !item.done });
    if (!item.done) showToast('Куплено: ' + item.text);
  }

  /* ── delete ── */
  function deleteItem(id) {
    if (!currentItemsRef) return;
    currentItemsRef.child(id).remove();
  }

  /* ── bulk: uncheck all done ── */
  function uncheckAll() {
    if (!currentItemsRef || !currentItems) return;
    var updates = {};
    Object.keys(currentItems).forEach(function(id){
      if (currentItems[id].done) updates[id+'/done'] = false;
    });
    if (Object.keys(updates).length) {
      currentItemsRef.update(updates);
      showToast('Галочки сняты');
    }
  }

  /* ── bulk: clear done ── */
  function clearDone() {
    if (!currentItemsRef || !currentItems) return;
    var updates = {};
    Object.keys(currentItems).forEach(function(id){
      if (currentItems[id].done) updates[id] = null;
    });
    if (Object.keys(updates).length) {
      currentItemsRef.update(updates);
      showToast('Купленные удалены');
    }
  }

  document.getElementById('uncheckAllBtn').addEventListener('click', uncheckAll);
  document.getElementById('clearDoneBtn').addEventListener('click', clearDone);

  /* ── render items ── */
  function renderItems(itemsMap) {
    currentItems = itemsMap;

    var arr = [];
    if (itemsMap) {
      Object.keys(itemsMap).forEach(function(id){
        arr.push(Object.assign({_id:id}, itemsMap[id]));
      });
      arr.sort(function(a,b){ return (b.createdAt||0)-(a.createdAt||0); });
    }

    var total     = arr.length;
    var doneCount = arr.filter(function(i){ return i.done; }).length;
    var todoCount = total - doneCount;
    var pct       = total > 0 ? Math.round(doneCount/total*100) : 0;

    /* progress */
    document.getElementById('progSection').style.display = total > 0 ? 'block' : 'none';
    document.getElementById('progFill').style.width  = pct + '%';
    document.getElementById('progText').textContent  = doneCount + ' из ' + total + ' куплено';
    document.getElementById('progPct').textContent   = pct + '%';

    /* counters */
    document.getElementById('cAll').textContent  = total;
    document.getElementById('cTodo').textContent = todoCount;
    document.getElementById('cDone').textContent = doneCount;

    /* bulk bar: show only if there are done items */
    document.getElementById('bulkBar').className = 'bulk-bar' + (doneCount > 0 ? ' show' : '');

    /* filter */
    var visible = arr.filter(function(i){
      if (activeFilter==='todo') return !i.done;
      if (activeFilter==='done') return i.done;
      return true;
    });

    var listEl = document.getElementById('itemsList');
    if (visible.length === 0) {
      var icons = {all:'🛍️', todo:'🎉', done:'🛒'};
      var texts = {all:'Список пуст — добавьте продукты', todo:'Всё куплено!', done:'Ещё ничего не куплено'};
      listEl.innerHTML = '<div class="empty-msg"><span class="ico">'+icons[activeFilter]+'</span>'+texts[activeFilter]+'</div>';
      return;
    }

    listEl.innerHTML = visible.map(function(item){
      return '<div class="item'+(item.done?' done':'')+'" data-id="'+esc(item._id)+'">'
        + '<div class="cb">'+(item.done?'✓':'')+'</div>'
        + '<span class="itext">'+esc(item.text)+'</span>'
        + '<button class="delbtn" data-did="'+esc(item._id)+'">×</button>'
        + '</div>';
    }).join('');

    listEl.querySelectorAll('.item').forEach(function(el){
      el.addEventListener('click', function(e){
        if (e.target.classList.contains('delbtn')) return;
        toggleItem(el.getAttribute('data-id'));
      });
    });
    listEl.querySelectorAll('.delbtn').forEach(function(btn){
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        deleteItem(btn.getAttribute('data-did'));
      });
    });
  }

  /* ── filters ── */
  document.querySelectorAll('.fb').forEach(function(btn){
    btn.addEventListener('click', function(){
      activeFilter = btn.getAttribute('data-f');
      document.querySelectorAll('.fb').forEach(function(b){ b.classList.remove('on'); });
      btn.classList.add('on');
      if (currentItems !== undefined) renderItems(currentItems);
    });
  });

  /* ───────── HELPERS ───────── */
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2200);
  }
  function showError(msg) {
    var b = document.getElementById('errorBanner');
    b.textContent = msg; b.classList.add('show');
  }

  /* ───────── BOOT ───────── */
  initFirebase();
})();
</script>
</body>
</html>
