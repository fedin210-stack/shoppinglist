      <div class="pd" id="pd0"></div><div class="pd" id="pd1"></div>
      <div class="pd" id="pd2"></div><div class="pd" id="pd3"></div>
    </div>
    <div class="pin-grid" id="pinGrid">
      <button class="pk"><span>1</span><span class="sub"></span></button>
      <button class="pk"><span>2</span><span class="sub">ABC</span></button>
      <button class="pk"><span>3</span><span class="sub">DEF</span></button>
      <button class="pk"><span>4</span><span class="sub">GHI</span></button>
      <button class="pk"><span>5</span><span class="sub">JKL</span></button>
      <button class="pk"><span>6</span><span class="sub">MNO</span></button>
      <button class="pk"><span>7</span><span class="sub">PQRS</span></button>
      <button class="pk"><span>8</span><span class="sub">TUV</span></button>
      <button class="pk"><span>9</span><span class="sub">WXYZ</span></button>
      <button class="pk ghost"></button>
      <button class="pk"><span>0</span><span class="sub">+</span></button>
      <button class="pk back" id="backBtn">⌫</button>
    </div>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>

    {e:'🥟',t:'Пельмени'},{e:'🥟',t:'Вареники'},{e:'🥟',t:'Манты'},

    {e:'🧻',t:'Туалетная бумага'},{e:'🧼',t:'Мыло'},{e:'🧴',t:'Шампунь'},
    {e:'🪥',t:'Зубная щётка'},{e:'🧴',t:'Гель для душа'},{e:'🧴',t:'Кондиционер'},
    {e:'🧹',t:'Швабра'},{e:'🧺',t:'Стиральный порошок'},{e:'🪣',t:'Ведро'},
    {e:'🧴',t:'Средство для посуды'},{e:'🧻',t:'Бумажные полотенца'},{e:'🪥',t:'Зубная паста'},
    {e:'🧴',t:'Крем для рук'},{e:'🧴',t:'Дезодорант'},{e:'🪒',t:'Бритва'},
    {e:'💊',t:'Таблетки'},{e:'💊',t:'Витамины'},{e:'🩹',t:'Пластыри'},
    {e:'🛍️',t:'Пакеты'},{e:'🧻',t:'Салфетки'},{e:'🥄',t:'Одноразовая посуда'},
    {e:'🐾',t:'Корм для кошки'},{e:'🐾',t:'Корм для собаки'},{e:'🌿',t:'Удобрение'}
  ];

  var COLORS=['lc-purple','lc-blue','lc-green','lc-orange','lc-pink','lc-teal'];
  function pickColor(n){var h=0;for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))&0xffff;return COLORS[h%COLORS.length];}

  function initFirebase(){
    try{
      firebase.initializeApp(firebaseConfig);
      db=firebase.database(); listsRef=db.ref(DB_LISTS);
      db.ref('.info/connected').on('value',function(s){setSync('syncPill',s.val());setSync('syncPill2',s.val());});
      return true;
    }catch(e){showError('Firebase: '+e.message);return false;}
  }
  function setSync(id,on){var el=document.getElementById(id);if(!el)return;var lb=el.querySelector('span:last-child');el.className='sync-pill'+(on?' online':'');lb.textContent=on?'Онлайн':'Нет связи';}

  function updateDots(state){for(var i=0;i<4;i++){var d=document.getElementById('pd'+i);d.className='pd';if(state==='error')d.classList.add('err');else if(i<pinInput.length)d.classList.add('filled');}}
  function pinError(msg){var el=document.getElementById('pinDots');document.getElementById('pinErr').textContent=msg;updateDots('error');el.classList.add('shaking');el.addEventListener('animationend',function(){el.classList.remove('shaking');},{once:true});pinInput='';setTimeout(function(){updateDots('normal');document.getElementById('pinErr').textContent='';},1500);}
  function pressDigit(digit){if(pinInput.length>=4)return;pinInput+=digit;updateDots('normal');if(pinInput.length===4){setTimeout(function(){if(pinInput===PIN){showScreen('listsScreen');startLists();}else pinError('Неверный код');},160);}}
  document.getElementById('pinGrid').querySelectorAll('.pk:not(.ghost):not(.back)').forEach(function(btn){btn.addEventListener('click',function(){pressDigit(btn.querySelector('span').textContent.trim());});});
  document.getElementById('backBtn').addEventListener('click',function(){if(pinInput.length){pinInput=pinInput.slice(0,-1);updateDots('normal');}document.getElementById('pinErr').textContent='';});
  document.getElementById('logoutBtn').addEventListener('click',function(){if(currentItemsRef)currentItemsRef.off();if(listsRef)listsRef.off();pinInput='';updateDots('normal');showScreen('pinScreen');});

  function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}

  function startLists(){if(!db&&!initFirebase())return;listsRef.on('value',function(snap){renderLists(snap.val());});}

  function renderLists(data){
    var grid=document.getElementById('listsGrid');
    if(!data){grid.innerHTML='<div class="empty-msg"><span class="ico">📋</span>Нет списков — создайте первый!</div>';return;}
    var arr=Object.keys(data).map(function(id){return Object.assign({_id:id},data[id]);});
    arr.sort(function(a,b){return(a.createdAt||0)-(b.createdAt||0);});
    grid.innerHTML=arr.map(function(list){
      var icon=list.icon||'🛒', color=list.color||pickColor(list.name);
      var total=list.items?Object.keys(list.items).length:0;
      var done=list.items?Object.values(list.items).filter(function(i){return i.done;}).length:0;
      var meta=total===0?'Пусто':done+' из '+total+' куплено';
      return '<div class="list-card" data-lid="'+esc(list._id)+'">'
        +'<div class="list-card-icon '+color+'" data-iconid="'+esc(list._id)+'" title="Сменить иконку">'+icon+'</div>'
        +'<div class="list-card-body"><div class="list-card-name">'+esc(list.name)+'</div><div class="list-card-meta">'+meta+'</div></div>'
        +'<div class="list-card-arrow">›</div>'
        +'<button class="list-del-btn" data-delid="'+esc(list._id)+'">×</button></div>';
    }).join('');
    grid.querySelectorAll('.list-card').forEach(function(card){
      card.addEventListener('click',function(e){
        if(e.target.classList.contains('list-del-btn'))return;
        if(e.target.classList.contains('list-card-icon')||e.target.dataset.iconid){
          var iconId=e.target.dataset.iconid||(e.target.closest('[data-iconid]')||{}).dataset&&e.target.closest('[data-iconid]').dataset.iconid;
          if(iconId)openIconPicker(iconId,e.target.textContent.trim());
          return;
        }
        openList(card.getAttribute('data-lid'));
      });
    });
    grid.querySelectorAll('.list-del-btn').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();askDeleteList(btn.getAttribute('data-delid'),data[btn.getAttribute('data-delid')]);});});
  }

  function createList(name){name=name.trim();if(!name||!listsRef)return;listsRef.push({name:name,icon:'🛒',color:pickColor(name),createdAt:firebase.database.ServerValue.TIMESTAMP});showToast('Список «'+name+'» создан');}

  function askDeleteList(id,list){pendingDeleteId=id;document.getElementById('deleteModalText').textContent='Список «'+(list?list.name:'')+'» и все продукты будут удалены.';document.getElementById('deleteModal').classList.add('show');}
  document.getElementById('cancelDeleteBtn').addEventListener('click',function(){document.getElementById('deleteModal').classList.remove('show');});
  document.getElementById('confirmDeleteBtn').addEventListener('click',function(){if(pendingDeleteId&&listsRef){listsRef.child(pendingDeleteId).remove();showToast('Список удалён');}document.getElementById('deleteModal').classList.remove('show');});
  document.getElementById('deleteModal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});

  function openIconPicker(listId,currentIcon){
    iconTargetId=listId;selectedIcon=currentIcon;
    var grid=document.getElementById('iconGrid');
    grid.innerHTML=ALL_ICONS.map(function(icon){return '<button class="icon-option'+(icon===currentIcon?' selected':'')+'" data-icon="'+icon+'">'+icon+'</button>';}).join('');
    grid.querySelectorAll('.icon-option').forEach(function(btn){btn.addEventListener('click',function(){var icon=btn.getAttribute('data-icon');if(!iconTargetId||!listsRef)return;listsRef.child(iconTargetId).update({icon:icon});document.getElementById('iconModal').classList.remove('show');showToast('Иконка обновлена');});});
    document.getElementById('iconModal').classList.add('show');
  }
  document.getElementById('cancelIconBtn').addEventListener('click',function(){document.getElementById('iconModal').classList.remove('show');});
  document.getElementById('iconModal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
  document.getElementById('newListBtn').addEventListener('click',function(){var inp=document.getElementById('newListInp');createList(inp.value);inp.value='';inp.focus();});
  document.getElementById('newListInp').addEventListener('keydown',function(e){if(e.key==='Enter'){createList(this.value);this.value='';}});

  function openList(id){
    if(currentItemsRef)currentItemsRef.off();
    currentListId=id;currentItemsRef=listsRef.child(id+'/items');activeFilter='all';
    document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');});
    document.querySelector('.fb[data-f="all"]').classList.add('on');
    listsRef.child(id+'/name').once('value',function(s){document.getElementById('itemsTitle').textContent=s.val()||'Список';});
    showScreen('itemsScreen');
    currentItemsRef.on('value',function(snap){renderItems(snap.val());});
  }
  document.getElementById('backToLists').addEventListener('click',function(){if(currentItemsRef)currentItemsRef.off();hideAC();currentListId=null;activeFilter='all';showScreen('listsScreen');});

  function addItem(text){text=text.trim();if(!text||!currentItemsRef)return;currentItemsRef.push({text:text,done:false,createdAt:firebase.database.ServerValue.TIMESTAMP});showToast('Добавлено: '+text);}
  document.getElementById('addBtn').addEventListener('click',function(){var inp=document.getElementById('addInp');addItem(inp.value);inp.value='';hideAC();inp.focus();});
  document.getElementById('addInp').addEventListener('keydown',function(e){if(e.key==='Enter'){addItem(this.value);this.value='';hideAC();}if(e.key==='Escape')hideAC();});

  var acList=document.getElementById('acList');
  document.getElementById('addInp').addEventListener('input',function(){
    var q=this.value.trim().toLowerCase();
    if(q.length<1){hideAC();return;}
    var matches=SUGGESTIONS.filter(function(s){return s.t.toLowerCase().indexOf(q)===0;}).slice(0,6);
    if(!matches.length){hideAC();return;}
    acList.innerHTML=matches.map(function(s){var hi='<span class="ac-match">'+esc(s.t.slice(0,q.length))+'</span>'+esc(s.t.slice(q.length));return '<div class="ac-item" data-text="'+esc(s.t)+'"><span class="ac-icon">'+s.e+'</span>'+hi+'</div>';}).join('');
    acList.querySelectorAll('.ac-item').forEach(function(item){item.addEventListener('mousedown',function(e){e.preventDefault();addItem(item.getAttribute('data-text'));document.getElementById('addInp').value='';hideAC();});});
    acList.classList.add('open');
  });
  document.getElementById('addInp').addEventListener('blur',function(){setTimeout(hideAC,150);});
  function hideAC(){acList.classList.remove('open');}

  function toggleItem(id){if(!currentItemsRef||!currentItems)return;var item=currentItems[id];if(!item)return;currentItemsRef.child(id).update({done:!item.done});if(!item.done)showToast('Куплено: '+item.text);}
  function deleteItem(id){if(!currentItemsRef)return;currentItemsRef.child(id).remove();}
  function uncheckAll(){if(!currentItemsRef||!currentItems)return;var u={};Object.keys(currentItems).forEach(function(id){if(currentItems[id].done)u[id+'/done']=false;});if(Object.keys(u).length){currentItemsRef.update(u);showToast('Галочки сняты');}}
  function clearDone(){if(!currentItemsRef||!currentItems)return;var u={};Object.keys(currentItems).forEach(function(id){if(currentItems[id].done)u[id]=null;});if(Object.keys(u).length){currentItemsRef.update(u);showToast('Купленные удалены');}}
  document.getElementById('uncheckAllBtn').addEventListener('click',uncheckAll);
  document.getElementById('clearDoneBtn').addEventListener('click',clearDone);

  function renderItems(itemsMap){
    currentItems=itemsMap;
    var arr=[];
    if(itemsMap){Object.keys(itemsMap).forEach(function(id){arr.push(Object.assign({_id:id},itemsMap[id]));});arr.sort(function(a,b){return(b.createdAt||0)-(a.createdAt||0);});}
    var total=arr.length,doneCount=arr.filter(function(i){return i.done;}).length,todoCount=total-doneCount,pct=total>0?Math.round(doneCount/total*100):0;
    document.getElementById('progSection').style.display=total>0?'block':'none';
    document.getElementById('progFill').style.width=pct+'%';
    document.getElementById('progText').textContent=doneCount+' из '+total+' куплено';
    document.getElementById('progPct').textContent=pct+'%';
    document.getElementById('cAll').textContent=total;
    document.getElementById('cTodo').textContent=todoCount;
    document.getElementById('cDone').textContent=doneCount;
    var bulkBar=document.getElementById('bulkBar');
    if(doneCount>0)bulkBar.classList.add('show');else bulkBar.classList.remove('show');
    var visible=arr.filter(function(i){if(activeFilter==='todo')return!i.done;if(activeFilter==='done')return i.done;return true;});
    var listEl=document.getElementById('itemsList');
    if(!visible.length){var icons={all:'🛍️',todo:'🎉',done:'🛒'},texts={all:'Список пуст — добавьте продукты',todo:'Всё куплено!',done:'Ещё ничего не куплено'};listEl.innerHTML='<div class="empty-msg"><span class="ico">'+icons[activeFilter]+'</span>'+texts[activeFilter]+'</div>';return;}
    listEl.innerHTML=visible.map(function(item){return '<div class="item'+(item.done?' done':'')+'" data-id="'+esc(item._id)+'"><div class="cb">'+(item.done?'✓':'')+'</div><span class="itext">'+esc(item.text)+'</span><button class="delbtn" data-did="'+esc(item._id)+'">×</button></div>';}).join('');
    listEl.querySelectorAll('.item').forEach(function(el){el.addEventListener('click',function(e){if(e.target.classList.contains('delbtn'))return;toggleItem(el.getAttribute('data-id'));});});
    listEl.querySelectorAll('.delbtn').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();deleteItem(btn.getAttribute('data-did'));});});
  }

  document.querySelectorAll('.fb').forEach(function(btn){btn.addEventListener('click',function(){activeFilter=btn.getAttribute('data-f');document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');if(currentItems!==undefined)renderItems(currentItems);});});

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.classList.remove('show');},2200);}
  function showError(msg){var b=document.getElementById('errorBanner');b.textContent=msg;b.classList.add('show');}

  initFirebase();
})();
</script>
</body>
</html>
