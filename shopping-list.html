<!DOCTYPE html>
<html>
<head>
    <title>Shopping List with Firebase</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-database.js"></script>
    <script>
        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Example function to add an item to the shopping list
        function addItem() {
            const item = document.getElementById('itemInput').value;
            database.ref('shoppingList/').push({ item: item });
            document.getElementById('itemInput').value = '';
        }

        // Example function to retrieve items
        function getItems() {
            database.ref('shoppingList/').on('value', (snapshot) => {
                const items = snapshot.val();
                const itemList = document.getElementById('itemList');
                itemList.innerHTML = '';
                for (let id in items) {
                    const li = document.createElement('li');
                    li.textContent = items[id].item;
                    itemList.appendChild(li);
                }
            });
        }
        getItems();
    </script>
</head>
<body>
    <h1>My Shopping List</h1>
    <input type="text" id="itemInput" placeholder="Add an item">
    <button onclick="addItem()">Add Item</button>
    <ul id="itemList"></ul>
</body>
</html>
